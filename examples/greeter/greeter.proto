syntax = "proto3";

package greet;

option go_package = "github.com/bbyasyi/swagprot/examples/greeter/greetpb";

import "google/protobuf/timestamp.proto";

// Greeter exercises a unary RPC and a server-streaming RPC so the swagprot UI
// can be tried end to end.
service Greeter {
  // SayHello returns a single greeting.
  rpc SayHello(HelloRequest) returns (HelloReply);

  // SayHelloStream streams one greeting per requested count.
  rpc SayHelloStream(HelloStreamRequest) returns (stream HelloReply);
}

enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  ENGLISH = 1;
  INDONESIAN = 2;
  JAPANESE = 3;
}

message HelloRequest {
  string name = 1;
  Language language = 2;
  repeated string titles = 3;
}

message HelloReply {
  string message = 1;
  google.protobuf.Timestamp sent_at = 2;
}

message HelloStreamRequest {
  string name = 1;
  int32 count = 2;
}
